# SQL Server for StickyNotes (use with backend/.env DB_* pointing at localhost).
#
# 1. Create a .env file next to this file (same folder as docker-compose.yml) with:
#    MSSQL_SA_PASSWORD=<strong password: upper, lower, digit, symbol, 8+ chars>
#    Optional: MSSQL_TCP_PORT=1433
# 2. docker compose up -d
# 3. Connect as SA and run your schema (database stickynotesdb, users, notes tables).
#    Example: docker exec -it stickynotes-sql /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$MSSQL_SA_PASSWORD" -C
#    (pass -P from your shell after exporting MSSQL_SA_PASSWORD, or type it when prompted)

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: stickynotes-sql
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:?Set MSSQL_SA_PASSWORD in a .env file beside docker-compose.yml}
    ports:
      - "${MSSQL_TCP_PORT:-1433}:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q \"SELECT 1\" -C -b -o /dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 45s

volumes:
  sqlserver_data:
